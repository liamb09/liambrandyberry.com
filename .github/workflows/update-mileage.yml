name: Update Strava Stats

on:
  schedule:
    - cron: "0 0 * * *" # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Refresh Strava token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }})

          echo "$RESPONSE" > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Fetch athlete stats
        run: |
          mkdir -p data

          PAGE=1
          PER_PAGE=200

          echo "[]" > all_activities.json

          while true; do
            echo "Fetching page $PAGE..."

            curl -s \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://www.strava.com/api/v3/athlete/activities?page=$PAGE&per_page=$PER_PAGE" \
              > page.json

            COUNT=$(jq 'length' page.json)

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            jq -s '.[0] + .[1]' all_activities.json page.json > merged.json
            mv merged.json all_activities.json

            PAGE=$((PAGE + 1))
          done

          jq '
          {
            run_count:
              map(select(.sport_type == "Run" or .type == "Run"))
              | length,

            run_distance_meters:
              map(select(.sport_type == "Run" or .type == "Run") | .distance)
              | add,

            run_distance_miles:
              (
                (
                  map(select(.sport_type == "Run" or .type == "Run") | .distance)
                  | add
                ) / 1609.344
              )
          }
          ' all_activities.json > data/strava-stats.json

      - name: Commit updated stats
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/strava-stats.json

          git diff --staged --quiet || \
          git commit -m "Update Strava stats"

          git push
<!DOCTYPE html>

<html lang="en-us">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ page.title }}</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
        <link rel="stylesheet" href="{{ 'src/css/log.css' | relative_url }}" />
    </head>
    <body>
        <nav class="back-link">
            <a href="{{ '/bread-log/' | relative_url }}">← Bread Log</a>
        </nav>

        <header class="bake-header">
            <h1>{{ page.title }}</h1>

            <div class="bake-meta">
                <span>{{ page.date | date: "%-d %B %Y" }}</span>
                <span>•</span>
                <a href="{{ page.recipe_link | default: 'https://www.theperfectloaf.com/cookbooks/theperfectloaf/' }}" target="_blank">
                    {{ page.recipe_attribution | default: "The Perfect Loaf" }}
                </a>
            </div>
        </header>

        {{ content }}
    </body>
</html>
